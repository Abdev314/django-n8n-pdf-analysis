services:
  ollama:
    image: ollama/ollama
    container_name: hospital-ai-demo-ollama-1
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  n8n:
    image: n8nio/n8n
    container_name: hospital-ai-demo-n8n-1
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=America/Chicago
    volumes:
      - n8n:/home/node/.n8n
    depends_on:
      ollama:
        condition: service_healthy

  django:
    build: ./backend
    container_name: hospital-ai-demo-django-1
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - N8N_WEBHOOK_URL=http://n8n:5678/webhook/pdf-analyze
      - N8N_API_KEY=pdf-local-2026
      - DJANGO_DEBUG=1
    depends_on:
      - n8n
      - ollama

  react:
    build: ./frontend
    container_name: hospital-ai-demo-react-1    # ← Added for consistency
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      # - REACT_APP_API_URL=http://localhost:8000


    depends_on:
      - django

volumes:
  ollama:
  n8n:
  # Removed unused 'react' volume